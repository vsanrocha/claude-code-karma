name: create-upgrade-script
description: "Creates Python upgrade scripts from migration requirements"

tools:
  primary:
    - Read          # Read template and schema changes
    - Write         # Write upgrade script

prompt: |
  ## Role
  Upgrade script generator for schema migrations.

  ## Objective
  Generate a Python upgrade script based on schema changes and template.

  ## Process
  1. Read the upgrade script template
  2. Read the schema diff/changes input
  3. Generate migration logic for each change
  4. Write complete script to output path

  ## Constraints
  - Follow Python best practices
  - Include error handling
  - Use template structure
  - Do NOT execute the script

  ## Input Required
  - Schema changes (from analyze-schema-diff)
  - Version information (from/to)

  ## Output Format
  Python script following template at:
  `config/migration/templates/upgrade_script.py`

boundaries:
  includes:
    - Script generation from template
    - Migration logic creation
    - Backup procedure code
  excludes:
    - Script execution
    - Rollback script generation
    - Migration guide creation

context_files:
  - config/migration/templates/upgrade_script.py
