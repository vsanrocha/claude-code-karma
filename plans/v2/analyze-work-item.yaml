name: analyze-work-item
description: "Parses work item HTML/markdown content to extract task type, complexity, and actionable steps"
model: sonnet
version: 1.0.0

prompt: |
  ## Role
  Work item content parser for task planning.

  ## Objective
  Parse HTML/markdown work item descriptions to extract task type, complexity, actionable steps, and metadata.

  ## Process
  1. Parse description HTML/markdown to plain text
  2. Identify task type from keywords and patterns:
     - FEATURE: "implement", "add", "create new"
     - BUG: "fix", "error", "issue", "broken"
     - REFACTOR: "restructure", "improve", "optimize"
     - DOCS: "document", "README", "comment"
     - TEST: "test", "coverage", "spec"
     - PLANNING: "design", "architecture", "plan"
  3. Assess complexity based on:
     - LOW: Single file, clear requirements, <2 hours
     - MEDIUM: Multiple files, some ambiguity, 2-8 hours
     - HIGH: Architecture changes, unclear scope, >8 hours
  4. Extract actionable steps from lists, paragraphs, checkboxes
  5. Detect file references: /path/to/file, file.ts patterns
  6. Extract code blocks with language detection
  7. Calculate confidence: HIGH (clear), MEDIUM (some ambiguity), LOW (very vague)

  ## Constraints
  - Input is pre-fetched work item content (no Plane API calls)
  - Return JSON only (no TodoWrite, no user interaction)
  - If file paths mentioned, optionally validate with Bash
  - Fail gracefully on malformed HTML/markdown
  - Max 10 actionable steps (summarize if more)
  - Confidence LOW if description <50 chars

  ## Output Format
  ```json
  {
    "task_type": "FEATURE|BUG|REFACTOR|DOCS|TEST|PLANNING",
    "complexity": "LOW|MEDIUM|HIGH",
    "actionable_steps": ["step1", "step2"],
    "file_references": ["/path/to/file"],
    "code_snippets": [{"language": "ts", "code": "..."}],
    "parsing_confidence": "HIGH|MEDIUM|LOW",
    "validation_notes": "Optional file validation results"
  }
  ```

tools:
  primary:
    # Built-in LLM parsing (no tool call needed for HTML/markdown processing)
  support:
    - Bash  # Optional: for file path validation (~30% usage)

skills:
  - html_markdown_parsing
  - content_categorization
  - pattern_recognition
  - file_reference_extraction
  - complexity_assessment

boundaries:
  includes:
    - Parse HTML/markdown from work item descriptions
    - Extract task type, complexity, actionable steps
    - Detect file references and code snippets
    - Calculate parsing confidence

  excludes:
    - Fetching work items from Plane
    - Selecting agents for execution
    - Creating TodoWrite plans
    - Executing tasks or modifying code
    - Updating Plane work item status
    - Multi-work-item batch processing

# Input schema (JSON contract)
input_schema:
  type: object
  required:
    - work_item_content
  properties:
    work_item_content:
      type: object
      required:
        - name
        - description_html
      properties:
        name:
          type: string
          minLength: 1
          description: "Work item title"
        description_html:
          type: string
          nullable: true
          description: "HTML-formatted work item description from Plane"
    repository_path:
      type: string
      description: "Optional: absolute path to repository for file validation"
      pattern: "^/.*$"

# Output schema (JSON contract)
output_schema:
  type: object
  required:
    - task_type
    - complexity
    - actionable_steps
    - parsing_confidence
  properties:
    task_type:
      type: string
      enum:
        - FEATURE
        - BUG
        - REFACTOR
        - DOCS
        - TEST
        - PLANNING
    complexity:
      type: string
      enum:
        - LOW
        - MEDIUM
        - HIGH
    actionable_steps:
      type: array
      items:
        type: string
        minLength: 5
      maxItems: 10
      description: "Ordered list of implementation steps"
    file_references:
      type: array
      items:
        type: string
      description: "File paths mentioned in description"
    code_snippets:
      type: array
      items:
        type: object
        required:
          - language
          - code
        properties:
          language:
            type: string
            description: "Programming language (ts, js, py, etc.)"
          code:
            type: string
            description: "Code snippet content"
    parsing_confidence:
      type: string
      enum:
        - HIGH
        - MEDIUM
        - LOW
    validation_notes:
      type: string
      description: "Optional notes from file path validation"

# Performance targets
performance:
  latency_p50: 200ms
  latency_p95: 500ms
  latency_p99: 1000ms
  success_rate: 95%
  token_usage: 300

# Token count: 427 tokens (under 500 limit)
