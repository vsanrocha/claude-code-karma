name: Bug Report
description: Report a bug in Claude Code Karma
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the sections below to help us reproduce and fix the issue.

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of Claude Code Karma is affected?
      options:
        - API (FastAPI backend)
        - Frontend (SvelteKit dashboard)
        - Captain Hook (hook models)
        - Hook Scripts (live tracker / title generator)
        - SQLite / Database
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
      placeholder: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Start the API with `uvicorn main:app --reload --port 8000`
        2. Navigate to http://localhost:5173/projects
        3. Click on a project with 100+ sessions
        4. See error in browser console
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Output
      description: Paste any relevant logs from the API terminal, browser console, or hook output.
      render: shell

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Your setup details.
      value: |
        - OS:
        - Python version:
        - Node version:
        - Claude Code version:
        - Browser (if frontend issue):
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or information.
